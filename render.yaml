services:
  - type: web
    name: wishlist-orb-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: COOKIE_NAME
        value: wishlist_orb_token
      - key: COOKIE_SAME_SITE
        value: none
      - key: DATABASE_URL
        fromDatabase:
          name: wishlist-orb-db
          property: connectionString

  - type: web
    name: wishlist-orb-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: wishlist-orb-db
    plan: free
